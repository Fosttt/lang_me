name: build-apk

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      # android/ не хранится в репо — генерируем на месте
      - name: Generate android project
        working-directory: app
        run: flutter create --platforms=android --org com.fosttt --project-name lang_me .

      # постоянный ключ подписи из секретов: без него каждая сборка имела бы
      # новую подпись и Android отказывался бы обновлять приложение поверх
      - name: Setup release signing
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_B64 }}" | base64 -d > app/android/app/keystore.p12
          cat > app/android/key.properties <<EOF
          storeFile=keystore.p12
          storePassword=${{ secrets.ANDROID_KEY_PASS }}
          keyAlias=langme
          keyPassword=${{ secrets.ANDROID_KEY_PASS }}
          EOF

      - name: Patch Android project (permissions, queries, signing)
        run: python3 tools/patch_android.py

      # URL/токен/отпечаток сертификата AI-сервера вшиваются из секретов —
      # приложение работает из коробки, в репозитории значений нет
      - name: Build release APK
        working-directory: app
        run: |
          flutter pub get
          flutter build apk --release \
            --build-number=${{ github.run_number }} \
            --dart-define=AI_URL="${{ secrets.AI_URL }}" \
            --dart-define=AI_TOKEN="${{ secrets.AI_TOKEN }}" \
            --dart-define=AI_CERT_SHA256="${{ secrets.AI_CERT_SHA256 }}"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: lang_me-apk
          path: app/build/app/outputs/flutter-apk/app-release.apk

      - name: Publish rolling release
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: LangMe (latest build)
          files: app/build/app/outputs/flutter-apk/app-release.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
